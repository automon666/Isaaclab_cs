seed: 42
device: cuda:0
num_steps_per_env: 24
max_iterations: 1
empirical_normalization: {}
obs_groups:
  privileged:
  - policy
  proprioceptive:
  - policy
clip_actions: null
check_for_nan: true
save_interval: 100
experiment_name: cts_Isaac-Velocity-Flat-EVA02-v0
run_name: ''
logger: tensorboard
neptune_project: isaaclab
wandb_project: isaaclab
resume: false
load_run: .*
load_checkpoint: model_.*.pt
class_name: CTSRunner
privileged_encoder:
  latent_dim: 24
  hidden_dims:
  - 512
  - 256
  activation: elu
  obs_normalization: true
  use_history: false
  history_length: 5
proprioceptive_encoder:
  latent_dim: 24
  hidden_dims:
  - 512
  - 256
  activation: elu
  obs_normalization: true
  use_history: true
  history_length: 5
actor:
  class_name: MLPModel
  hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
  obs_normalization: false
  distribution_cfg: null
  stochastic: {}
  init_noise_std: {}
  noise_std_type: scalar
  state_dependent_std: false
critic:
  class_name: MLPModel
  hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
  obs_normalization: false
  distribution_cfg: null
  stochastic: {}
  init_noise_std: {}
  noise_std_type: scalar
  state_dependent_std: false
algorithm:
  class_name: CTS
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.01
  desired_kl: 0.01
  max_grad_norm: 1.0
  optimizer: adam
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  share_cnn_encoders: false
  rnd_cfg: null
  symmetry_cfg: null
  teacher_batch_size: 24576
  student_batch_size: 12288
  reconstruction_loss_coef: 1.0
  student_learning_rate: 0.001
  student_num_learning_epochs: 5
teacher_steps_per_env: 24
student_steps_per_env: 24
num_envs_teacher: {}
num_envs_student: {}
teacher_student_ratio: 2.0
