      - 1.0
      use_cache: false
      cache_dir: /tmp/isaaclab/terrains
    usd_path: null
    env_spacing: null
    use_terrain_origins: true
    visual_material:
      func: isaaclab.sim.spawners.materials.visual_materials:spawn_preview_surface
      diffuse_color:
      - 0.5
      - 0.5
      - 0.5
      emissive_color:
      - 0.0
      - 0.0
      - 0.0
      roughness: 0.5
      metallic: 0.0
      opacity: 1.0
    physics_material:
      func: isaaclab.sim.spawners.materials.physics_materials:spawn_rigid_body_material
      static_friction: 1.0
      dynamic_friction: 1.0
      restitution: 0.0
      friction_combine_mode: multiply
      restitution_combine_mode: multiply
      compliant_contact_stiffness: 0.0
      compliant_contact_damping: 0.0
    max_init_terrain_level: 0
    debug_vis: false
  lin_vel_reward_scale: 1.0
  yaw_rate_reward_scale: 0.5
  z_vel_reward_scale: -2.0
  ang_vel_reward_scale: -0.05
  joint_torque_reward_scale: -2.5e-05
  joint_accel_reward_scale: -2.5e-07
  action_rate_reward_scale: -0.01
  feet_air_time_reward_scale: 0.5
  undesired_contact_reward_scale: -1.0
  flat_orientation_reward_scale: -5.0
agent:
  seed: 42
  device: cuda:0
  num_steps_per_env: 24
  max_iterations: 1500
  empirical_normalization: false
  obs_groups: {}
  clip_actions: null
  check_for_nan: true
  save_interval: 50
  experiment_name: eva02_flat
  run_name: ''
  logger: tensorboard
  neptune_project: isaaclab
  wandb_project: isaaclab
  resume: false
  load_run: .*
  load_checkpoint: model_.*.pt
  class_name: OnPolicyRunner
  actor: {}
  critic: {}
  algorithm:
    class_name: PPO
    num_learning_epochs: 5
    num_mini_batches: 4
    learning_rate: 0.001
    schedule: adaptive
    gamma: 0.99
    lam: 0.95
    entropy_coef: 0.01
